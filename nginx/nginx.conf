worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Compose service name — resolved via Docker's embedded DNS.
    upstream fastapi_v2 {
        server fastapi-v2:8001;
    }

    upstream livekit_upstream {
        server livekit:7880;
    }

    server {
        listen 80;
        server_name _;
        # Plain HTTP -> HTTPS. Keep /nginx-health off https-redirect so
        # scripts/health-check.sh and container orchestrators can probe
        # nginx itself without a TLS handshake.
        location = /nginx-health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/self-signed.crt;
        ssl_certificate_key /etc/nginx/ssl/self-signed.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        client_max_body_size 25m;

        location = /nginx-health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Machine-to-machine API (API key + x-workspace-id).
        location /api/v2/ {
            proxy_pass http://fastapi_v2;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Dashboard + programmatic API (JWT or API key). Same FastAPI
        # process as v2 — app/main.py mounts both routers on one app.
        location /api/v1/ {
            proxy_pass http://fastapi_v2;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # LiveKit signaling (WebSocket) + REST. Real-time media (RTP/SRTP)
        # travels over UDP directly between clients and the livekit
        # container's published port range — nginx only fronts signaling.
        location /livekit/ {
            proxy_pass http://livekit_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # Root: voice webhooks (Twilio), /health, /api/docs — all served by
        # the same FastAPI process (app/main.py mounts health_router and
        # api_docs_router with no /api/v1 or /api/v2 prefix).
        location / {
            proxy_pass http://fastapi_v2;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
