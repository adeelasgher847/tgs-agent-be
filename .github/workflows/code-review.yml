name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    environment: ai-review              # dedicated env — no protection rules, holds ANTHROPIC_API_KEY

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch --no-tags origin "${{ github.event.pull_request.base.ref }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic flake8 mypy pytest httpx

      - name: Run AI code review
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        shell: bash
        run: |
          set -uo pipefail
          python agents/github_review_agent.py \
            --base "origin/${{ github.event.pull_request.base.ref }}" \
            > review_output.txt 2>review_error.txt || {
            EXIT_CODE=$?
            ERROR_BODY=$(cat review_error.txt 2>/dev/null | tail -5)
            if echo "$ERROR_BODY" | grep -q "credit balance is too low"; then
              echo "⚠️ **AI review skipped** — Anthropic API credit balance is too low. Please top up credits at https://console.anthropic.com/settings/billing and re-run this workflow." > review_output.txt
            elif echo "$ERROR_BODY" | grep -q "ANTHROPIC_API_KEY"; then
              echo "⚠️ **AI review skipped** — \`ANTHROPIC_API_KEY\` is not set or invalid in the \`ai-review\` GitHub environment." > review_output.txt
            else
              echo "⚠️ **AI review agent crashed** (exit code $EXIT_CODE). Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." > review_output.txt
            fi
            exit 0
          }

      - name: Post review as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let review;
            try {
              review = fs.readFileSync('review_output.txt', 'utf8').trim();
            } catch (e) {
              review = '⚠️ Review output not found — the agent may have crashed. Check the workflow logs.';
            }

            if (!review) {
              review = '⚠️ The agent produced no output. Check the workflow logs.';
            }

            // Delete previous AI review comments
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments.data) {
              if (c.body.startsWith('<!-- ai-review -->')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            // Post fresh review
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `<!-- ai-review -->\n## 🤖 AI Code Review\n\n${review}`,
            });
