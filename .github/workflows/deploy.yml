name: Deploy Pipeline (Production)

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"  # Deploy to Production on semantic version tags

env:
  PROJECT_PATH: "/home/ubuntu/happyassist/tgs-agent-be"

jobs:
  quality-gates:
    name: Run Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Pip Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff black pytest-asyncio

      - name: Run Ruff Lint Check
        run: ruff check . --exclude alembic/versions --ignore F401,F841,F541,F811,F821,E402,E711,E712,E702,E722,E741

      - name: Run Black Code Format Check
        run: black --check app/ tests/ || echo "::warning::Black formatting issues found - not blocking"
        continue-on-error: true

      - name: Run Unit Tests
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ELEVENLABS_ENCRYPTION_KEY: ${{ secrets.ELEVENLABS_ENCRYPTION_KEY }}
          WEBHOOK_SECRET_ENCRYPTION_KEY: ${{ secrets.WEBHOOK_SECRET_ENCRYPTION_KEY }}
        run: pytest tests/ -v --ignore=tests/integration --ignore=tests/db -x

      - name: Run Smoke Test (Start App & Check Health)
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ELEVENLABS_ENCRYPTION_KEY: ${{ secrets.ELEVENLABS_ENCRYPTION_KEY }}
          WEBHOOK_SECRET_ENCRYPTION_KEY: ${{ secrets.WEBHOOK_SECRET_ENCRYPTION_KEY }}
        run: |
          # Start app in background
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8001 &
          PID=$!
          sleep 5
          # Test health endpoint
          curl --fail http://localhost:8001/health || { kill $PID; exit 1; }
          # Terminate background server
          kill $PID

  deploy-production:
    name: Deploy to Production (EC2)
    needs: [quality-gates]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: production # Enables GitHub manual approval gate
    steps:
      - name: Deploy to Production via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            if [ ! -d "${{ env.PROJECT_PATH }}" ]; then
              git clone https://github.com/adeelasgher847/tgs-agent-be.git ${{ env.PROJECT_PATH }}
            fi
            cd ${{ env.PROJECT_PATH }}
            git fetch --all
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}
            docker compose down
            docker compose up --build -d
            docker compose run --rm --entrypoint "python3" web -m alembic upgrade head

  notify:
    name: Send Slack Notification
    needs: [quality-gates, deploy-production]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Slack Webhook Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: deployments
          SLACK_COLOR: ${{ (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) && 'danger' || 'good' }}
          SLACK_TITLE: "Deployment Status: ${{ (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) && 'FAILED' || 'SUCCESS' }}"
          SLACK_MESSAGE: |
            *Workflow:* ${{ github.workflow }}
            *Commit:* ${{ github.sha }}
            *Triggered By:* ${{ github.actor }}
            *Ref:* ${{ github.ref_name }}
            *Job Results:*
            - Quality Gates: ${{ needs.quality-gates.result }}
            - Production Deploy: ${{ needs.deploy-production.result }}
