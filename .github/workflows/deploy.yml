name: Deploy to AWS EC2

on:
  push:
    branches:
      - dev  # Dev branch push hote hi deploy ho jaye

env:
  PROJECT_PATH: "/home/ubuntu/tgs-agent-be"

jobs:
  deploy:
    name: Build & Deploy to EC2
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # SSH into EC2 server and deploy
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        script: |
          # 1. Check if repository folder exists, otherwise clone it
          if [ ! -d "${{ env.PROJECT_PATH }}" ]; then
            git clone https://github.com/adeelasgher847/tgs-agent-be.git ${{ env.PROJECT_PATH }}
          fi
          
          cd ${{ env.PROJECT_PATH }}
          
          # 2. Pull the latest code
          git fetch --all
          git checkout dev
          git pull origin dev
          
          # 3. Restart and rebuild Docker containers
          docker compose down
          docker compose up --build -d
          
          # 4. Run Alembic migrations inside the new container
          docker compose run --rm web alembic upgrade head
