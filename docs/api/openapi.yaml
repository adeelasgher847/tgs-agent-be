components:
  schemas:
    AccountSnapshot:
      properties:
        user_id:
          type: string
          format: uuid
          title: User Id
        email:
          type: string
          title: Email
        tenant_id:
          type: string
          format: uuid
          title: Tenant Id
        tenant_name:
          type: string
          title: Tenant Name
        credits:
          type: number
          title: Credits
        currency_label:
          type: string
          title: Currency Label
          default: credits
      type: object
      required:
      - user_id
      - email
      - tenant_id
      - tenant_name
      - credits
      title: AccountSnapshot
    ActiveJobRow:
      properties:
        job_description_id:
          type: string
          format: uuid
          title: Job Description Id
        job_title:
          type: string
          title: Job Title
        open_roles:
          type: integer
          title: Open Roles
          description: Planned or configured openings (matching_criteria.open_roles/headcount,
            default 1)
        applicant_count:
          type: integer
          title: Applicant Count
          description: Resumes currently associated with this job
        posted_at:
          type: string
          format: date-time
          title: Posted At
        posted_ago:
          type: string
          title: Posted Ago
      type: object
      required:
      - job_description_id
      - job_title
      - open_roles
      - applicant_count
      - posted_at
      - posted_ago
      title: ActiveJobRow
    AddFlowToFolderRequest:
      properties:
        flowId:
          type: string
          format: uuid
          title: Flowid
      additionalProperties: false
      type: object
      required:
      - flowId
      title: AddFlowToFolderRequest
    AgentCreate:
      properties:
        name:
          type: string
          maxLength: 80
          minLength: 3
          title: Name
        llmModel:
          type: string
          maxLength: 100
          minLength: 1
          title: Llmmodel
        ttsModel:
          $ref: '#/components/schemas/TtsModelSchema'
        sttModel:
          allOf:
          - $ref: '#/components/schemas/SttModelSchema'
          nullable: true
        sttSettings:
          allOf:
          - $ref: '#/components/schemas/SttSettingsJsonSchema'
          nullable: true
        status:
          $ref: '#/components/schemas/AgentStatusEnum'
          default: pending
        elevenLabsApiKey:
          type: string
          maxLength: 500
          minLength: 1
          nullable: true
        system_prompt:
          type: string
          nullable: true
        voice_type:
          allOf:
          - $ref: '#/components/schemas/VoiceTypeEnum'
          nullable: true
        fallback_response:
          type: string
          nullable: true
        agent_temperature:
          type: integer
          maximum: 100.0
          minimum: 0.0
          nullable: true
        agent_max_tokens:
          type: integer
          exclusiveMinimum: 0.0
          nullable: true
        tts_settings_json:
          allOf:
          - $ref: '#/components/schemas/TtsSettingsJsonSchema'
          nullable: true
        greeting_message:
          type: string
          nullable: true
        is_inbound_agent:
          type: boolean
          title: Is Inbound Agent
          default: false
        is_follow_up_agent:
          type: boolean
          title: Is Follow Up Agent
          default: false
        transfer_route_id:
          type: string
          format: uuid
          nullable: true
      additionalProperties: false
      type: object
      required:
      - name
      - llmModel
      - ttsModel
      title: AgentCreate
      description: Create body — ``llmModel`` + ``ttsModel`` required; no catalog
        UUIDs in API.
    AgentListResponse:
      properties:
        data:
          items:
            $ref: '#/components/schemas/AgentOut'
          type: array
          title: Data
        total:
          type: integer
          title: Total
        page:
          type: integer
          title: Page
        pageSize:
          type: integer
          title: Pagesize
      type: object
      required:
      - data
      - total
      - page
      - pageSize
      title: AgentListResponse
    AgentOut:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        name:
          type: string
          title: Name
        llmModel:
          type: string
          nullable: true
        ttsModel:
          allOf:
          - $ref: '#/components/schemas/TtsModelSchema'
          nullable: true
        sttModel:
          allOf:
          - $ref: '#/components/schemas/SttModelSchema'
          nullable: true
        status:
          $ref: '#/components/schemas/AgentStatusEnum'
        createdAt:
          type: string
          format: date-time
          title: Createdat
        updatedAt:
          type: string
          format: date-time
          nullable: true
        tenant_id:
          type: string
          format: uuid
          nullable: true
        system_prompt:
          type: string
