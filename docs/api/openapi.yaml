  /api/v1/schedule/from-call-session:
    post:
      tags:
      - Scheduled Calls
      summary: Create Scheduled Call From Call Session
      description: 'Create a scheduled call in CRM from a **completed** call session.


        User reviews the call, then hits this endpoint. Backend reads the session''s
        transcript

        (and optional call_metadata["scheduled_call_request"]) to get date, time,
        and timezone or city.

        If only city is provided, timezone is resolved via city/country. Optional
        agent_id chooses

        which agent to use for the scheduled call; otherwise the session''s agent
        is used.


        **Request body:**

        - `call_session_id`: UUID of the completed call session

        - `agent_id`: Optional UUID of the agent to use for the scheduled call (must
        belong to tenant)


        **Flow:**

        1. Validates call session exists and belongs to current tenant and is completed.

        2. Gets schedule from call_metadata["scheduled_call_request"] or extracts
        from transcript (LLM).

        3. Resolves timezone (explicit or from city/country).

        4. Creates one scheduled call item in the user''s linked CRM board.'
      operationId: create_scheduled_call_from_call_session_api_v1_schedule_from_call_session_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleFromCallSessionRequest'
        required: true
      responses:
        '200':
          description: Successful Response
