openapi: 3.0.3
info:
  title: Happy Assist Ai
  description: Multi-tenant SaaS Voice Agent Backend
  version: 1.0.0
paths:
  /:
    get:
      summary: Read Root
      operationId: read_root__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_dict_'
  /api/v1/users/register:
    post:
      tags:
      - users
      summary: Register User
      operationId: register_user_api_v1_users_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_UserOut_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users/login:
    post:
      tags:
      - users
      summary: Login
      description: 'User login endpoint that returns JWT token with role information
        as object.

        Uses the user''s current_tenant_id if set, otherwise uses the first available
        tenant.

        Automatically assigns admin role if user has no role in current tenant.'
      operationId: login_api_v1_users_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_TokenResponse_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users/login/google:
    post:
      tags:
      - users
      summary: Google Login
      operationId: google_login_api_v1_users_login_google_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleLoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_TokenResponse_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users/refresh:
    post:
      tags:
      - users
      summary: Refresh Tokens
      description: "Refresh endpoint:\n1) If access_token is provided and still valid\
        \ -> return \"still valid\"\n2) If access_token expired but refresh_token\
        \ valid -> issue new access_token\n   (reuse cached one only if unexpired\
        \ and same role as current DB state)\n3) If refresh_token invalid/expired\
        \ -> return 401"
      operationId: refresh_tokens_api_v1_users_refresh_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users/logout:
    post:
      tags:
      - users
      summary: Logout
      description: 'Logout endpoint: revoke all active refresh tokens for the user.

        Note: Access JWTs are stateless and cannot be revoked server-side.'
      operationId: logout_api_v1_users_logout_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_dict_'
      security:
      - HTTPBearer: []
  /api/v1/users/token-info:
    get:
      tags:
      - users
      summary: Get Token Information
      description: Get detailed information about the current token including expiration
      operationId: get_token_information_api_v1_users_token_info_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_dict_'
      security:
      - HTTPBearer: []
  /api/v1/users/check-token-expiration:
    get:
      tags:
      - users
      summary: Check Token Expiration
      description: Check if the current token is expired
      operationId: check_token_expiration_api_v1_users_check_token_expiration_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_dict_'
      security:
      - HTTPBearer: []
  /api/v1/users/my-tenants:
    get:
      tags:
      - users
      summary: Get User Tenants
      description: 'Get all tenants associated with the current user for dropdown
        selection.

        Returns list of tenants with id and name, plus current tenant id.'
      operationId: get_user_tenants_api_v1_users_my_tenants_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_dict_'
      security:
      - HTTPBearer: []
  /api/v1/users/forgot-password:
    post:
      tags:
      - users
      summary: Forgot Password
      description: Send password reset email to user
      operationId: forgot_password_api_v1_users_forgot_password_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_ForgotPasswordResponse_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users/reset-password:
    post:
      tags:
      - users
      summary: Reset Password
      description: Reset password using reset token and revoke all refresh tokens
      operationId: reset_password_api_v1_users_reset_password_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_ResetPasswordResponse_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users/profile:
    get:
      tags:
      - users
      summary: Get User Profile
      description: 'Get complete user profile information including role and tenant
        details.

        Requires JWT Bearer token authentication.'
      operationId: get_user_profile_api_v1_users_profile_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_UserProfile_'
      security:
      - HTTPBearer: []
    put:
      tags:
      - users
      summary: Update User Profile
      description: 'Update user profile information.

        Requires JWT Bearer token authentication.

        Only updates fields that are provided in the request.'
      operationId: update_user_profile_api_v1_users_profile_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_UserProfile_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/v1/users/tenant-members:
    get:
      tags:
      - users
      summary: Get Tenant Members
      description: 'Get all members of the current tenant with their roles.

        Requires JWT Bearer token authentication and tenant membership.'
      operationId: get_tenant_members_api_v1_users_tenant_members_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_list_TenantMember__'
      security:
      - HTTPBearer: []
  /api/v1/api-keys/:
    get:
      tags:
      - API Keys
      summary: List Workspace Api Keys
      description: List API keys for the current workspace (masked — no raw secrets).
      operationId: list_workspace_api_keys_api_v1_api_keys__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_list_ApiKeyOut__'
      security:
      - HTTPBearer: []
    post:
      tags:
      - API Keys
      summary: Create Workspace Api Key
      description: Create a workspace API key. The raw secret is returned exactly
        once.
      operationId: create_workspace_api_key_api_v1_api_keys__post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_ApiKeyCreated_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/v1/api-keys/{key_id}:
    delete:
      tags:
      - API Keys
      summary: Revoke Workspace Api Key
      description: Revoke an API key (``is_active=false``) and purge its Redis cache
        entry.
      operationId: revoke_workspace_api_key_api_v1_api_keys__key_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: key_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Key Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_ApiKeyOut_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/tenants/create:
    post:
      tags:
      - tenants
      summary: Create Tenant
      description: 'Create a new tenant organization and associate the creator as
        its admin.


        Requirements:

        - Tenant name must be unique

        - Creator user is auto-linked to the tenant with role "admin"

        - Sets the new tenant as user''s current tenant

        - Returns tenant_id and tenant details with updated token'
      operationId: create_tenant_api_v1_tenants_create_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantCreate'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_TokenResponse_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/v1/tenants/switch:
    post:
      tags:
      - tenants
      summary: Switch Tenant
      description: 'Switch to a different tenant and return new JWT token with role
        information.

        Also updates the user''s current_tenant_id in the database.'
      operationId: switch_tenant_api_v1_tenants_switch_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SwitchTenantRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_TokenResponse_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/v1/tenants/start-credit-checkout-session:
    post:
      tags:
      - tenants
      summary: Start Credit Checkout Session
      description: 'Start Stripe checkout session for one-time credit purchase (pay
        as you go).

        $1 = 10 credits. User can buy any amount of credits.'
      operationId: start_credit_checkout_session_api_v1_tenants_start_credit_checkout_session_post
      security:
      - HTTPBearer: []
      parameters:
      - name: amount
        in: query
        required: true
        schema:
          type: number
          title: Amount
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/tenants/credits:
    get:
      tags:
      - tenants
      summary: Get Tenant Credits
      description: Get current credits for the current user's active tenant.
      operationId: get_tenant_credits_api_v1_tenants_credits_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - HTTPBearer: []
  /api/v1/tenants/verify-payment/{session_id}:
    get:
      tags:
      - tenants
      summary: Verify Payment
      description: 'Verify payment status using Stripe checkout session ID.

        If paid, add credits to tenant exactly once per session.'
      operationId: verify_payment_api_v1_tenants_verify_payment__session_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/tenants/verify-last-payment:
    get:
      tags:
      - tenants
      summary: Verify Last Payment
      description: 'Verify the last payment for the current tenant.

        Automatically gets the latest session ID from subscription table.'
      operationId: verify_last_payment_api_v1_tenants_verify_last_payment_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - HTTPBearer: []
  /api/v1/tenants/payment-history:
    get:
      tags:
      - tenants
      summary: Get Payment History
      description: 'Get complete payment history for the current tenant.

        Returns all payment attempts, failures, refunds, and invoices.'
      operationId: get_payment_history_api_v1_tenants_payment_history_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - HTTPBearer: []
  /api/v1/workspace/invite:
    post:
      tags:
      - Workspace Invitations
      summary: Invite Team Member
      operationId: invite_team_member_api_v1_workspace_invite_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_InviteOut_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security: &id001
      - ApiKeyAuth: []
        WorkspaceId: []
  /api/v1/workspace/invitations:
    get:
      tags:
      - Workspace Invitations
      summary: List Invitations
      operationId: list_invitations_api_v1_workspace_invitations_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_list_InviteOut__'
      security: *id001
  /api/v1/workspace:
    post:
      tags:
      - Workspace
      summary: Create a new workspace
      description: Create a new workspace. Name must be unique among active workspaces
        (3–50 chars).
      operationId: create_workspace_api_v1_workspace_post
      responses:
        '201':
          description: 'Workspace created — flat body: {id, name, createdAt}'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceCreatedOut'
        '400':
          description: Validation error — name too short/long or invalid JSON
        '401':
          description: Missing or invalid x-api-key / x-workspace-id header
        '403':
          description: Workspace mismatch or JWT used on an API-key-only route
        '404':
          description: Workspace not found
        '409':
          description: Workspace name already taken
        '429':
          description: Rate limit exceeded (60 req / 60 s per API key)
      security: *id001
  /api/v1/workspace/{workspace_id}:
    get:
      tags:
      - Workspace
      summary: Get a workspace by id
      operationId: get_workspace_by_id_api_v1_workspace__workspace_id__get
      parameters:
      - name: workspace_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Workspace Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_WorkspaceOut_'
        '400':
          description: Validation error — name too short/long or invalid JSON
        '401':
          description: Missing or invalid x-api-key / x-workspace-id header
        '403':
          description: Workspace mismatch or JWT used on an API-key-only route
        '404':
          description: Workspace not found
        '409':
          description: Workspace name already taken
        '429':
          description: Rate limit exceeded (60 req / 60 s per API key)
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security: *id001
    delete:
      tags:
      - Workspace
      summary: Soft delete a workspace
      operationId: soft_delete_workspace_api_v1_workspace__workspace_id__delete
      parameters:
      - name: workspace_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Workspace Id
      responses:
        '204':
          description: Workspace soft-deleted, no body
        '400':
          description: Validation error — name too short/long or invalid JSON
        '401':
          description: Missing or invalid x-api-key / x-workspace-id header
        '403':
          description: Workspace mismatch or JWT used on an API-key-only route
        '404':
          description: Workspace not found
        '409':
          description: Workspace name already taken
        '429':
          description: Rate limit exceeded (60 req / 60 s per API key)
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security: *id001
  /api/v1/workspace/name:
    put:
      tags:
      - Workspace
      summary: Update the authenticated workspace's name
      description: Update the name of the authenticated workspace. 409 on duplicate
        name.
      operationId: update_workspace_name_api_v1_workspace_name_put
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_WorkspaceOut_'
        '400':
          description: Validation error — name too short/long or invalid JSON
        '401':
          description: Missing or invalid x-api-key / x-workspace-id header
        '403':
          description: Workspace mismatch or JWT used on an API-key-only route
        '404':
          description: Workspace not found
        '409':
          description: Workspace name already taken
        '429':
          description: Rate limit exceeded (60 req / 60 s per API key)
      security: *id001
  /api/v1/roles/{role_id}:
    get:
      tags:
      - roles
      summary: Get Role
      description: Get a specific role by ID
      operationId: get_role_api_v1_roles__role_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: role_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Role Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_RoleOut_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/agent/:
    post:
      tags:
      - Voice Agent
      summary: Create Agent
      description: Create agent (JWT or API key). Returns ticket-shaped JSON.
      operationId: create_agent_api_v1_agent__post
      security:
      - HTTPBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Voice Agent
      summary: List Agents
      description: 'Paginated list: ``{ data, total, page, pageSize }``.'
      operationId: list_agents_api_v1_agent__get
      security:
      - HTTPBearer: []
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          description: Page number
          default: 1
          title: Page
        description: Page number
      - name: pageSize
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 20
          title: Pagesize
      - name: search
        in: query
        required: false
        schema:
          type: string
          nullable: true
        description: Search by name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/agent/{agent_id}:
    get:
      tags:
      - Voice Agent
      summary: Get Agent
      description: Get agent by id (404 if missing or other workspace).
      operationId: get_agent_api_v1_agent__agent_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Agent Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Voice Agent
      summary: Update Agent
      description: Update mutable fields (JWT or API key).
      operationId: update_agent_api_v1_agent__agent_id__put
      security:
      - HTTPBearer: []
      parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Agent Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Voice Agent
      summary: Delete Agent
      description: Soft delete; 409 if an active phone number is bound.
      operationId: delete_agent_api_v1_agent__agent_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Agent Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/agent/search/{search_term}:
    get:
      tags:
      - Voice Agent
      summary: Search Agents
      description: Search agents by name (dashboard JWT).
      operationId: search_agents_api_v1_agent_search__search_term__get
      security:
      - HTTPBearer: []
      parameters:
      - name: search_term
        in: path
        required: true
        schema:
