  /api/v1/schedule:
    post:
      tags:
      - Scheduled Calls
      summary: Upload Scheduled Calls Csv
      description: 'Upload CSV file to create scheduled calls in CRM container (Monday.com,
        ClickUp, Jira, Trello).


        **CSV Format (2 columns only):**

        ```

        phone_number,call_time_utc

        ```


        **Required:**

        - Select CRM config (crm_config_id query parameter - required)

        - Select agent before upload (agent_id query parameter - required)

        - CSV with phone_number and call_time_utc only


        **Optional:**

        - phone_number_id query parameter - if provided, all calls in CSV will use
        this phone number


        **Required Columns:**

        - `phone_number`: Phone number to call (e.g., +1234567890)

        - `call_time_utc`: Scheduled time in UTC - ISO format or YYYY-MM-DD HH:MM:SS


        **Note:** `tenant_id` and `user_id` are automatically taken from your logged-in
        session.

        All calls in this CSV will use the selected CRM, agent and phone_number_id
        (if provided).


        **Example CSV:**

        ```csv

        phone_number,call_time_utc

        +1234567890,2024-12-02T14:30:00Z

        +0987654321,2024-12-02T14:31:00Z

        +1234567892,2024-12-02T14:32:00Z

        ```


        **Flow:**

        1. Select CRM config (crm_config_id)

        2. Select agent from dropdown

        3. Optionally select phone number (phone_number_id query param)

        4. Upload CSV (2 columns: phone_number, call_time_utc)

        5. Backend parses CSV and validates data

        6. Creates items in the user''s CRM container (status: "Pending", tenant_id
        and phone_number_id stored)

        7. n8n cron (every 1 min) detects new items

        8. n8n waits until call_time_utc

        9. n8n calls backend `/voice/call/initiate` with phone_number_id from CRM

        10. n8n updates CRM status ("Called" or "Failed")


        **Data storage:** CSV rows live only in CRM. The backend stores one container

        record per user (shared by all their tenants). Items are identified by tenant_id
        field/column.'
      operationId: upload_scheduled_calls_csv_api_v1_schedule_post
      security:
      - HTTPBearer: []
      parameters:
      - name: crm_config_id
        in: query
        required: true
        schema:
          type: string
          description: CRM configuration ID (UUID)
          title: Crm Config Id
        description: CRM configuration ID (UUID)
      - name: agent_id
        in: query
        required: true
        schema:
          type: string
          description: Agent ID to use for all calls in this CSV (required)
          title: Agent Id
        description: Agent ID to use for all calls in this CSV (required)
      - name: phone_number_id
        in: query
        required: false
        schema:
          type: string
          nullable: true
        description: Optional phone number ID to use for all calls in CSV
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_upload_scheduled_calls_csv_api_v1_schedule_post'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_CSVUploadResponse_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/schedule/single-call:
    post:
      tags:
      - Scheduled Calls
      summary: Create Single Scheduled Call
      description: 'Create a single scheduled call in CRM container (Monday.com, ClickUp,
        Jira, Trello).


        **Query Parameters:**

        - `crm_config_id`: CRM configuration ID (UUID) - required

        - `agent_id`: Agent ID (UUID)

        - `phone_number`: Phone number to call (e.g., +1234567890)

        - `call_time_utc`: Scheduled time in UTC - ISO format or YYYY-MM-DD HH:MM:SS

        - `phone_number_id`: Optional phone number ID from DB to use for call


        **Flow:**

        1. Validates CRM config exists and belongs to tenant

        2. Validates agent exists and belongs to tenant

        3. Generates unique batch_id for this single call

        4. Creates item in user''s CRM container (status: "Pending", batch_id stored,
        phone_number_id stored)

        5. n8n cron detects new item and triggers call at scheduled time

        6. When call completes (Called/Failed), n8n will send email for this batch


        **Note:** `tenant_id` and `user_id` are automatically taken from logged-in
        session.


        **n8n → `/voice/call/initiate`:** Trello cards created for **appointment follow-up**
        reminders include

        `Appointment ID: <uuid>` in the card description. Pass that value as `appointment_id`
