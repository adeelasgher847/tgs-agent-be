  /api/v1/crm-config:
    get:
      tags:
      - CRM Configuration
      summary: Get All Crm Configs
      description: 'Get all global CRM configurations.


        Returns a list of all configured CRMs (Monday.com, ClickUp, Jira, Trello).

        All users can see all configured CRMs.'
      operationId: get_all_crm_configs_api_v1_crm_config_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_list_CRMConfigOut__'
      security:
      - HTTPBearer: []
    post:
      tags:
      - CRM Configuration
      summary: Create Crm Config
      description: "Create a new global CRM configuration (Owner only).\n\nSupports\
        \ all CRMs:\n- **Monday.com**: Requires `api_key` and optional `additional_config.workspace_id`\n\
        - **ClickUp**: Requires OAuth setup. First create config with `additional_config.client_id`,\
        \ `additional_config.client_secret`, and `additional_config.redirect_uri`.\
        \ Then use `/api/v1/auth/clickup/authorize` to get authorization URL, and\
        \ after user authorizes, access token will be stored automatically. Optional:\
        \ `additional_config.space_id`, `folder_id`\n- **Jira**: Requires `api_key`,\
        \ `additional_config.email`, `additional_config.server_url`\n- **Trello**:\
        \ Requires `api_key`, `additional_config.api_token`\n\n**Access:** Only Owner\
        \ role can create CRM configurations.\n**Note:** CRM configs are global -\
        \ all users can select any configured CRM.\n\n**Example Request (Monday.com):**\n\
        ```json\n{\n    \"crm_type\": \"monday\",\n    \"api_key\": \"your_monday_api_key\"\
        ,\n    \"additional_config\": {\n        \"workspace_id\": \"optional_workspace_id\"\
        \n    }\n}\n```\n\n**Example Request (ClickUp OAuth):**\n```json\n{\n    \"\
        crm_type\": \"clickup\",\n    \"api_key\": null,\n    \"additional_config\"\
        : {\n        \"client_id\": \"your_clickup_client_id\",\n        \"client_secret\"\
        : \"your_clickup_client_secret\",\n        \"redirect_uri\": \"https://yourdomain.com/api/v1/auth/clickup/callback\"\
        ,\n        \"space_id\": \"optional_space_id\"\n    }\n}\n```\nNote: `api_key`\
        \ can be `null` for ClickUp OAuth. After creating this config, call `/api/v1/auth/clickup/authorize`\
        \ to get authorization URL. Access token will be automatically stored after\
        \ OAuth callback.\n\n**Example Request (Trello):**\n```json\n{\n    \"crm_type\"\
        : \"trello\",\n    \"api_key\": \"your_trello_api_key\",\n    \"additional_config\"\
        : {\n        \"api_token\": \"your_trello_api_token\"\n    }\n}\n```"
      operationId: create_crm_config_api_v1_crm_config_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CRMConfigCreate'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_CRMConfigOut_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
